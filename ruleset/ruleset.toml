  '''(?ix)^\b(?:print|console\.(?:log|error|warn|info|debug)|(?:logger|logging|log)\.(?:debug|info|warning|warn|error|critical|exception|fatal))\s*\(\s*(?:(?:theme\s*)?`[^`\r\n]*\bExpected\s+[A-Z][A-Z0-9_]{1,100}\s+to\s+be\s+provided\s+as\s+an\s+env(?:ironment)?\s+variable\b[^`\r\n]*`|(?:[bru]{0,2})?["'][^"'\r\n]*\bExpected\s+[A-Z][A-Z0-9_]{1,100}\s+to\s+be\s+provided\s+as\s+an\s+env(?:ironment)?\s+variable\b[^"'\r\n]*["'])\s*\)\s*;?$'''
]
regex = '''(?ix)\b(?:print|console\.(?:log|error|warn|info|debug)|(?:logger|logging|log)\.(?:debug|info|warning|warn|error|critical|exception|fatal))\s*\((?=(?:[^;\r\n]|\r?\n[ \t]+){0,2048}?["']?(?<![A-Za-z0-9])(?:[A-Za-z0-9]+[_-]|(?-i:[a-z0-9]+(?=[A-Z]))){0,3}(?:{personal_identifiers}|{personal_profile}|{financial_information}|{passwords}|{generic_secrets}|{api_keys}|{provider_api_keys}|{tokens}|{provider_tokens}|{cloud_credentials}|{cryptographic_keys}|{generic_credentials})(?:[_-][A-Za-z0-9]+){0,2}(?![A-Za-z0-9])["']?)(?:[^;\r\n]|\r?\n[ \t]+){0,2048}\)'''


