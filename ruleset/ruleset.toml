[[rules]]

id = "A04-327-001"
name = "Use of Weak Cryptographic Algorithm"
desc = "MD5, SHA1, DES, RC4, ECB mode 등 보안상 취약하거나 권장되지 않는 암호 알고리즘이 사용된 경우"
owasp = ["A04"] 
cwe = ["CWE-327"]
severity = "high"

# Python의 직접 import 호출과 JavaScript Web Crypto를 포함해 대표적인 취약 알고리즘 사용을 탐지한다.
# hashlib 계열 호출 전체를 매치하므로 중첩 호출 뒤의 usedforsecurity=False도 정상적으로 제외된다.
# v0.3.1: hashlib.new / crypto.createHash 인자 패턴의 ['"] 유실 복원 + 취약 알고리즘명 검사 추가
allowlist = [
  '''(?ix)^(?:hashlib\.(?:md4|md5|sha1)\s*\(\s*[^();\r\n]*\busedforsecurity\s*=\s*false\s*\)|hashlib\.new\s*\(\s*["'](?:md4|md5|sha1)["'][^();\r\n]*\busedforsecurity\s*=\s*false\s*\))$'''
]
