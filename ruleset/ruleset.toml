[[rules]]
id = "A10-770-005"
name = "Disabled Python Network Timeout"
desc = "Python HTTP 또는 소켓 요청의 timeout을 None으로 설정하여 연결이 무기한 유지될 수 있는 경우"
owasp = ["A10"]
cwe = ["CWE-770"]
severity = "medium"

allowlist = [
  '''(?ix)^\s*[^\r\n]*\b(?:example|sample|demo|dummy|mock|placeholder)[_-]?(?:url|uri|endpoint|host|request)\b[^\r\n]*$'''
]

regex = '''(?ix)(?:\b(?:(?:requests|httpx)\.(?:get|post|put|patch|delete|head|options|request)|session\.(?:get|post|put|patch|delete|request))\s*\([^\r\n]*\btimeout\s*=\s*None\b|\bhttpx\.Timeout\s*\(\s*None\s*\)|\bsocket\.setdefaulttimeout\s*\(\s*None\s*\)|\b(?:aiohttp\s*\.\s*)?ClientTimeout\s*\((?:[^;\r\n]|\r?\n[ \t]+){0,500}?\btotal\s*=\s*None\b)'''


