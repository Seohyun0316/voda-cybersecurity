[[rules]]

id = "A05-89-001"
name = "Dynamic Python SQL Query Construction"
desc = "SQL 문자열을 f-string, 문자열 결합, 퍼센트 포맷팅 또는 format 메서드로 구성해 execute 계열 함수에 전달하는 경우"
owasp = ["A05"]
cwe = ["CWE-89"]
severity = "high"

path_allowlist = [
  '''(?ix)(?:^|[\\/])(?:tests?|examples?|fixtures?)(?:[\\/]|$)'''
]
allowlist = [
  '''(?ix)(?:\{\s*|\+\s*|%\s*|\.format\s*\(\s*)(?:dummy|example|sample|placeholder|mock|fixture|test)(?:[_-]?(?:id|query|sql|input|value|param))?\b''',
