[[rules]]
id = "A05-79-004"
name = "Dynamic HTML in Python HTTP Response"
desc = "위험한 동적 렌더링 함수를 사용하지 않고 요청값을 HTML 문자열에 결합하여 HttpResponse 또는 HTMLResponse로 직접 반환하는 경우"
owasp = ["A05"]
cwe = ["CWE-79"]
severity = "high"

path_allowlist = [
  '''(?ix)(?:^|[\\/])(?:tests?|examples?|fixtures?)(?:[\\/]|$)'''
]

allowlist = [
  '''(?isx)^\s*[^\r\n]*\b(?:HttpResponse|HTMLResponse)\s*\((?:[^()]|\((?:[^()]|\([^()]*\))*\)){0,1200}\b(?:example|sample|demo|dummy|mock|placeholder)[_-]?(?:html|content|input|payload|data|name)\b(?:[^()]|\((?:[^()]|\([^()]*\))*\)){0,1200}\)\s*$'''
]

regex = '''(?isx)(?:\b(?:HttpResponse|HTMLResponse)\s*\(
(?!(?:[^()]|\((?:[^()]|\([^()]*\))*\)){0,1200}\b(?:render_template_string|mark_safe|Markup)\s*\()
(?=(?:[^()]|\([^()]*\)){0,1200}<[^>\r\n]+>)
(?=(?:(?:[^()]|\([^()]*\)){0,1200}|[^()]{0,1200}\([^()]{0,1200})\brequest\s*\.\s*(?:args|GET|query_params|form|values|json)(?:\s*\.\s*get\s*\([^()\r\n]*\)|\s*\[[^\]\r\n]+\]|\s*\.\s*[A-Za-z_][A-Za-z0-9_]*)?)
(?:[^()]|\((?:[^()]|\([^()]*\))*\)){0,1200}\)|\breturn\s+(?=(?:[^\r\n]|\r?\n[ \t]+){0,1200}<[^>\r\n]+>)(?=(?:[^\r\n]|\r?\n[ \t]+){0,1200}\brequest\s*\.\s*(?:args|GET|query_params|form|values|json)(?:\s*\.\s*get\s*\([^()\r\n]*\)|\s*\[[^\]\r\n]+\]|\s*\.\s*[A-Za-z_][A-Za-z0-9_]*)?)(?:[^\r\n]|\r?\n[ \t]+){1,1200})'''


