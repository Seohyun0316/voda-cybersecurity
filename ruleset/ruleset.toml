# 현재는 한국 주민등록번호 형식만 지원하며 생년월일 범위를 함께 확인한다.
# 2월은 29·30일까지 허용한다 (연도별 윤년 판별을 하지 않는 의도적 과탐 허용,
# 오탐은 2차 ML 필터에서 처리).
# v0.3.1: TOML 문법 오류(여는 대괄호 누락) 및 미종결 문자 클래스 수정
# allowlist = [
