# GitLeaks의 설정 구조를 참고한 VibeSafe 정규식 룰셋이다.
# 각 룰은 분류 메타데이터, 탐지 regex, 해당 룰에만 적용되는 allowlist를 갖는다.
# allowlist는 파일 경로나 주변 줄이 아니라 regex가 탐지한 문자열 전체에만 적용된다.
#
# [v0.3.1 변경 사항 — 버그 수정만 포함]
#   1. PII-359-003 allowlist: TOML 문법 오류(여는 대괄호 누락) 및 미종결 문자 클래스 수정
#   2. A04-327-001: hashlib.new / crypto.createHash 인자 패턴의 ['"] 유실 복원 + 알고리즘명 검사 추가
#   3. PII-200-001 allowlist[2], A04-798-003 allowlist[1]: 빈 문자열 sentinel의 ['"] 유실 복원
#   4. PII-200-001 allowlist[4], A04-798-001 allowlist[1]: Access-Control-Allow-Credentials의 ['"] 유실 복원
#   5. PII-201-002: 도달 불가능한 dead lookahead (?!_-\b) 제거 (동작 변화 없음)
#   6. PII-359-003: 2월 29·30일 과탐 허용을 주석으로 명시 (동작 변화 없음)

# [v0.3.2 변경 사항]
# name field 형식 일관되게 수정 (e.g. insertion of whole... -> Insertion of Whole...)
# id 형식 수정 (e.g. PII-201-01 -> PII-201-001)

# [v1.0.0 변경 사항]
# 모든 유형에 regex와 allowlist 매핑 완료 

# [v1.1.0 변경 사항]
# 1. keyword set 접두어 패턴에 camelCase 처리 추가 (adminToken, userApiKey 등 탐지)
#    (?:[A-Za-z0-9]+[_-]){0,3} -> (?:[A-Za-z0-9]+[_-]|(?-i:[a-z0-9]+(?=[A-Z]))){0,3}
# 2. A02-489-001/002 (CWE-489 디버그모드) 삭제 - 매핑표 v1.2 미포함 항목
#    -> A02는 352/434/862/295로 매핑표와 정합

# [v1.1.1 변경 사항]
# camelCase 탐지에 있어서 약간의 성능 개선

# [v1.2.0 변경 사항]
# A02-434-002, A02-434-003을 파이썬 룰로 수정

# [v2.0.0 변경 사항]
# 최종적으로 사용할 룰셋 외 다른 룰들은 모두 주석 처리 및 일부 오류 수정

# [v2.1.0 변경 사항]
# 미사용 룰셋 주석 처리 누락 수정

# [v2.2.0 변경 사항]
# A04-256-001, A04-798-004, A10-770-003 프로젝트에서 제외

title = "VibeSafe Rule Set"
version = "2.2.0" 
[rule_config]
# 현재는 언어 필터링에 사용하지 않으며 룰셋의 대상 언어를 나타내는 메타데이터다.
target_lang = ["Python"]

# 각 regex는 {passwords}, {tokens}처럼 필요한 키워드 셋을 직접 참조한다.
[keyword_sets]

