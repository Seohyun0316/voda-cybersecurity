[[rules]]
id = "A10-770-007"
name = "Disabled or Excessive Request Size Limit"
desc = "요청 본문이나 업로드의 최대 크기를 없애거나 지나치게 큰 값으로 설정하여 자원 고갈이 발생할 수 있는 경우"
owasp = ["A10"]
cwe = ["CWE-770"]
severity = "high"

allowlist = [
  '''(?ix)^\s*[^\r\n]*\b(?:example|sample|demo|dummy|mock|placeholder)[_-]?(?:queue|limit|size|payload|body|upload)\b[^\r\n]*$'''
]

regex = '''(?ix)(?:\b(?:MAX_CONTENT_LENGTH|DATA_UPLOAD_MAX_MEMORY_SIZE|FILE_UPLOAD_MAX_MEMORY_SIZE)\s*=\s*None\b|\b(?:express|bodyParser)\.(?:json|urlencoded|raw|text)\s*\(\s*\{[^\r\n}]*\blimit\s*:\s*["'](?:\d{3,}\s*mb|\d+\s*(?:gb|tb))["'][^\r\n}]*\}|\b(?:fileSize|fieldSize)\s*:\s*(?:Infinity|Number\.MAX_SAFE_INTEGER)\b|\b(?:maxContentLength|maxBodyLength)\s*:\s*(?:-1|Infinity|Number\.MAX_SAFE_INTEGER)\b)'''
