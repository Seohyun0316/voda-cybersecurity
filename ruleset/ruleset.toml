[[rules]]

id = "PII-201-001"
name = "Insertion of Whole User Objects into Sent Data"
desc = "API 응답에 사용자 객체 전체가 반환되는 경우"
owasp = ["PII"] 
cwe = ["CWE-201"]
severity = "medium"

allowlist = []
regex = '''(?ix)(?:(?:\breturn\s+(?:jsonify|JSONResponse|Response)\s*\(\s*|\b(?:jsonify|JSONResponse|Response)\s*\(\s*|\b(?:res|response)(?:\s*\.\s*status\s*\([^()\r\n]{0,64}\))?\s*\.\s*(?:json|send)\s*\(\s*)(?:await\s+)?(?:current[_-]?)?(?:user|account|profile|customer|member)(?![A-Za-z0-9_])(?!\s*\.)(?:\s*\))?|(?:\breturn\s+)?(?:jsonify|JSONResponse|Response)\s*\(\s*(?:await\s+)?(?:current[_-]?)?(?:user|account|profile|customer|member)\s*\.\s*(?:__dict__|to_dict\s*\(\s*\)|dict\s*\(\s*\)|model_dump\s*\(\s*\))\s*\))'''


[[rules]]

id = "PII-201-002"
name = "Insertion of Sensitive Information into Sent JSON"
desc = "응답 JSON에 개인정보·인증정보 등 민감정보가 직접 포함된 경우"
owasp = ["PII"] 
cwe = ["CWE-201"]
severity = "high"

allowlist = []
regex = '''(?ix)(?:\breturn\s+(?:jsonify|JSONResponse|Response)\s*\(\s*|\b(?:jsonify|JSONResponse|Response)\s*\(\s*|\b(?:res|response)(?:\s*\.\s*status\s*\([^()\r\n]{0,64}\))?\s*\.\s*(?:json|send)\s*\(\s*)(?:[\s\S]{0,2048}?(?:\{|,)[ \t\r\n]{0,64}|[ \t\r\n]{0,64})["']?(?<![A-Za-z0-9_])(?!(?:masked|redacted|hashed)[_-])(?:[A-Za-z0-9]+[_-]|(?-i:[a-z0-9]+(?=[A-Z]))){0,3}(?:{personal_identifiers}|{personal_profile}|{financial_information}|{passwords}|{generic_secrets}|{api_keys}|{provider_api_keys}|{tokens}|{provider_tokens}|{cloud_credentials}|{cryptographic_keys})(?:[_-][A-Za-z0-9]+){0,2}(?![A-Za-z0-9])["']?\s*(?:[:=]\s*(?!(?:[bru]{0,2})?["'][^"'\r\n]*\*{3})(?:[bru]{0,2}["'][^"'\r\n]{1,256}["']|`(?![^`\r\n]*\$\{)[^`\r\n]{1,256}`|[A-Za-z_$][A-Za-z0-9_.$\[\]]{0,127})|(?=[,}]))'''


[[rules]]

id = "PII-209-001"
name = "Generation of Error Message Containing Sensitive Information"
desc = "예외 메시지가 사용자에게 그대로 전달되는 경우"
owasp = ["PII"] 
cwe = ["CWE-209"]
severity = "medium"

allowlist = []
regex = '''(?ix)(?:\breturn\s+(?:jsonify|JSONResponse|Response)\s*\(\s*|\b(?:jsonify|JSONResponse|Response)\s*\(\s*|\b(?:res|response)(?:\s*\.\s*status\s*\([^()\r\n]{0,64}\))?\s*\.\s*(?:json|send)\s*\(\s*)(?:\{[\s\S]{0,2048}?|[\s\S]{0,256}?)(?:(?:str|repr)\s*\(\s*(?:e|err|exc|error|exception)\s*\)|(?:e|err|exc|error|exception)\s*\.\s*(?:message|stack|stacktrace|args)\b|traceback\.format_exc\s*\(\s*\)|sys\.exc_info\s*\(\s*\))'''


