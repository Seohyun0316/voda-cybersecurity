(?=(?:[^()]|\((?:[^()]|\([^()]*\))*\)){0,1200}(?:
\brequest\s*\.\s*(?:args|GET|query_params|form|values|json|data|body)(?:\s*\.\s*get\s*\([^()\r\n]*\)|\s*\[[^\]\r\n]+\]|\s*\.\s*[A-Za-z_][A-Za-z0-9_]*)?
|
\brequest\s*\.\s*get_json\s*\(\s*\)(?:\s*\.\s*get\s*\([^()\r\n]*\)|\s*\[[^\]\r\n]+\]|\s*\.\s*[A-Za-z_][A-Za-z0-9_]*)?
