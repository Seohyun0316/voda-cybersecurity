<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>프로필</title></head>
<body>
<h2>자기소개 입력</h2>
<textarea id="bioInput" rows="4" cols="40" placeholder="자기소개를 입력하세요"></textarea><br>
<button onclick="updateBio()">저장</button>
<h3>내 소개</h3>
<div id="bioDisplay"></div>
<script>
function updateBio() {
  const bio = document.getElementById('bioInput').value;
  document.getElementById('bioDisplay').innerHTML = bio;
}
</script>
</body>
</html>
