<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>채팅</title>
<style>
#chatbox { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; }
</style>
</head>
<body>
<div id="chatbox"></div>
<input type="text" id="msgInput" placeholder="메시지 입력" style="width:80%">
<button onclick="sendMsg()">전송</button>
<script>
function sendMsg() {
  const msg = document.getElementById('msgInput').value;
  document.getElementById('chatbox').innerHTML += '<div>' + msg + '</div>';
  document.getElementById('msgInput').value = '';
  const chatbox = document.getElementById('chatbox');
  chatbox.scrollTop = chatbox.scrollHeight;
}
document.getElementById('msgInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') sendMsg();
});
</script>
</body>
</html>
